<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <defs>
    <!-- Horizontal gradient applied across the whole 32x32 userspace
         so the bricks each pick up one slice of the gradient based
         on their x position: left column pink, middle cyan, right
         green. Matches the gradient direction of the original
         mixwave wave-M wordmark. -->
    <linearGradient
      id="mix-grad"
      x1="4" y1="16" x2="28" y2="16"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#e94886" />
      <stop offset="50%" stop-color="#56d2e6" />
      <stop offset="100%" stop-color="#b5e651" />
    </linearGradient>
  </defs>
  <g fill="url(#mix-grad)">
    <rect x="4"  y="5"  width="4.5" height="2.5" rx="0.6" />
    <rect x="9"  y="5"  width="4.5" height="2.5" rx="0.6" />
    <rect x="18.5" y="5" width="4.5" height="2.5" rx="0.6" />
    <rect x="23.5" y="5" width="4.5" height="2.5" rx="0.6" />
    <rect x="4"  y="8"  width="4.5" height="2.5" rx="0.6" />
    <rect x="13" y="8"  width="6"   height="2.5" rx="0.6" />
    <rect x="23.5" y="8" width="4.5" height="2.5" rx="0.6" />
    <rect x="4"  y="11" width="4.5" height="2.5" rx="0.6" />
    <rect x="9"  y="11" width="4.5" height="2.5" rx="0.6" />
    <rect x="18.5" y="11" width="4.5" height="2.5" rx="0.6" />
    <rect x="23.5" y="11" width="4.5" height="2.5" rx="0.6" />
    <rect x="4"  y="14" width="4.5" height="2.5" rx="0.6" />
    <rect x="13" y="14" width="6"   height="2.5" rx="0.6" />
    <rect x="23.5" y="14" width="4.5" height="2.5" rx="0.6" />
    <rect x="4"  y="17" width="4.5" height="2.5" rx="0.6" />
    <rect x="13" y="17" width="6"   height="2.5" rx="0.6" />
    <rect x="23.5" y="17" width="4.5" height="2.5" rx="0.6" />
    <rect x="4"  y="20" width="4.5" height="2.5" rx="0.6" />
    <rect x="13" y="20" width="6"   height="2.5" rx="0.6" />
    <rect x="23.5" y="20" width="4.5" height="2.5" rx="0.6" />
    <rect x="4"  y="23" width="4.5" height="2.5" rx="0.6" />
    <rect x="13" y="23" width="6"   height="2.5" rx="0.6" />
    <rect x="23.5" y="23" width="4.5" height="2.5" rx="0.6" />
  </g>
</svg>
