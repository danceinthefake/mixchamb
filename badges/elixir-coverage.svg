<svg xmlns="http://www.w3.org/2000/svg" width="159" height="20" role="img" aria-label="elixir coverage: 70%">
  <title>elixir coverage: 70%</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="159" height="20" rx="3" fill="#fff"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="119" height="20" fill="#555"/>
    <rect x="119" width="40" height="20" fill="#a4a61d"/>
    <rect width="159" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <text aria-hidden="true" x="595" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="990">elixir coverage</text>
    <text x="595" y="140" transform="scale(.1)" fill="#fff" textLength="990">elixir coverage</text>
    <text aria-hidden="true" x="1390" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="200">70%</text>
    <text x="1390" y="140" transform="scale(.1)" fill="#fff" textLength="200">70%</text>
  </g>
</svg>
